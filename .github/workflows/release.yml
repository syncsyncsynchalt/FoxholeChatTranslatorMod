name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: CMake 構成
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DENABLE_GAME_COPY=OFF

      - name: ビルド (Release)
        run: cmake --build build --config Release --parallel

      - name: リリース ZIP を作成
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outDir  = "ChatTranslator-$version"
          New-Item -ItemType Directory -Path $outDir | Out-Null

          # DLL + 設定
          Copy-Item "build\Release\version.dll"        $outDir
          Copy-Item "build\Release\chat_translator.dll" $outDir
          Copy-Item "config.ini"                        $outDir
          Copy-Item "term_protection.txt"               $outDir

          # インストーラー / アンインストーラー
          Copy-Item "install.bat"    $outDir
          Copy-Item "uninstall.bat"  $outDir

          # アセット (フォントはインストーラーが実行時にダウンロード)
          New-Item -ItemType Directory -Path "$outDir\assets" | Out-Null
          Copy-Item "assets\radio_on.wav"  "$outDir\assets\"
          Copy-Item "assets\radio_off.wav" "$outDir\assets\"

          # ZIP 化
          $zipName = "ChatTranslator-$version.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName
          Write-Host "パッケージ完了: $zipName"

      - name: GitHub Release を作成して ZIP をアップロード
        uses: softprops/action-gh-release@v2
        with:
          files: ChatTranslator-*.zip
          generate_release_notes: true
