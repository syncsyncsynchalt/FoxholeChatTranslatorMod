; FoxholeChatTranslator - 設定ファイル
; ゲーム起動前に編集してください

[General]
; デバッグコンソールを表示する (1=有効, 0=無効)
EnableConsole=1

; チャットログの出力先 (空=DLLと同じディレクトリ)
LogFilePath=

; 初期化待機時間 (ミリ秒) - UE4エンジン初期化完了を待つ
InitDelayMs=10000

[Discovery]
; 探索モード: ProcessEventの全呼び出しをログ出力する (1=有効, 0=無効)
; 有効にするとパフォーマンスが大幅に低下します
; チャット関連の関数名を特定するために一時的に使用してください
DumpAllEvents=0

; 関数名フィルタ (カンマ区切り, 部分一致)
; 例: Chat,Message,Say,Text,Receive
FunctionNameFilter=Chat,Message,Say,Broadcast,Squad,Leader,Modified,Receive,Send,Text,Notify,Event,War

[Addresses]
; 手動アドレス指定 (16進数, 0=自動検出)
; パターンスキャンが失敗した場合にx64dbg等で調べたアドレスを指定
ProcessEventAddress=0
GNamesAddress=0
; ProcessEvent vtable インデックス (Dumper-7により0x42=66と判明)
ProcessEventVtableIndex=66
; HWBP スキャン開始インデックス (デフォルト 64)
; 診断Cで候補が見つからない場合、この値を変更して再テスト
HWBPStartIndex=64

[Patterns]
; ProcessEventのバイトパターン (複数候補, 上から順に試行)
; 形式: hex bytes (??=ワイルドカード)
; UE4 4.24-4.27 候補パターン
Pattern1=40 55 56 57 41 54 41 55 41 56 41 57 48 81 EC ?? ?? ?? ?? 48 8D 6C 24
Pattern2=40 55 56 57 41 54 41 55 41 56 41 57 48 8D 6C 24 ?? 48 81 EC
Pattern3=48 89 5C 24 ?? 48 89 74 24 ?? 55 57 41 54 41 56 41 57 48 8D 6C 24

; GNamesのバイトパターン
GNamesPattern1=48 8D 05 ?? ?? ?? ?? EB ?? 48 8D 0D ?? ?? ?? ?? E8 ?? ?? ?? ?? C6 05
GNamesPattern2=48 8D 0D ?? ?? ?? ?? E8 ?? ?? ?? ?? 48 8B 44 24 ?? 48 89 05

[Stage2]
; 接頭辞文字 (Stage 2で使用)
Prefix=★

[Stage3]
; Ollama API エンドポイント
OllamaEndpoint=http://localhost:11434/api/generate
; 使用するモデル
OllamaModel=gemma3:4b
; 翻訳先言語
TargetLanguage=ja
