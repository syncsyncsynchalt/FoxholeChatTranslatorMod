; FoxholeChatTranslator - 設定ファイル
; ゲーム起動前に編集してください

[General]
; デバッグコンソールを表示する (1=有効, 0=無効)
EnableConsole=1

; デモモード (1=デモメッセージ自動切替, 0=実チャット駆動)
DemoMode=0

[Translation]
; Ollama API エンドポイント
OllamaEndpoint=http://localhost:11435/api/generate

; 起動時の翻訳モード (ゲーム内ボタンで変更可能)
; Off / Japanese / Zundamon / English / Russian / Chinese / Korean
Mode=Zundamon

; パフォーマンスプリセット (Low / Medium / High)
; Low: 最小リソース、ローエンドPC向け
; Medium: バランス型、ミドルレンジPC向け
; High: 最速、ハイエンドPC向け
PerformancePreset=High

[TTS]
; 起動時の読み上げモード (ゲーム内ボタンで変更可能)
; Off / Original / Translated
Mode=Translated
