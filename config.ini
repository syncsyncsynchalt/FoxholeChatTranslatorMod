; FoxholeChatTranslator - 設定ファイル
; ゲーム起動前に編集してください

[General]
; デバッグコンソールを表示する (1=有効, 0=無効)
EnableConsole=1

; チャットログの出力先 (空=DLLと同じディレクトリ)
LogFilePath=

; 初期化待機時間 (ミリ秒) - UE4エンジン初期化完了を待つ
InitDelayMs=10000

[Translation]
; 翻訳機能を有効にする (1=有効, 0=無効)
Enabled=1

; Ollama API エンドポイント
OllamaEndpoint=http://localhost:11434/api/generate

; 翻訳先言語
TargetLanguage=Japanese

; パフォーマンスプリセット (Low / Medium / High)
; Low: 最小リソース、ローエンドPC向け
; Medium: バランス型、ミドルレンジPC向け
; High: 最速、ハイエンドPC向け
PerformancePreset=Medium

[Overlay]
; デモモード (1=デモメッセージ自動切替, 0=実チャット駆動)
DemoMode=0

[Addresses]
; ProcessEvent vtable インデックス (Dumper-7により0x42=66と判明)
ProcessEventVtableIndex=66

[TTS]
; 読み上げ言語 (auto=テキストから自動判定 / ja / en / ru / zh / ko)
; チャットの翻訳先と合わせて "ja" にするとすべて日本語音声で読み上げます
Language=auto
